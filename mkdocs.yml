site_name: Pizza Tower
site_description: 
site_url: https://pizza-tower-game.readthedocs.io

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  icon:
    logo: material/extension
  palette:
    - scheme: default
      primary: brown
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: brown
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_javascript:
  - js/tracker.js

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Features: features.md
  - How to Download: how-to-download.md
  - FAQ: faq.md
  - Pizza Tower Nintendo Switch: pizza-tower-nintendo-switch.md
  - Pizza Tower 3D: pizza-tower-3d.md
  - Pizza Tower Ps5: pizza-tower-ps5.md
  - Pizza Tower Original Game: pizza-tower-original-game.md
